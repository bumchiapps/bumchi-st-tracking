name: Process Shipping Label
on:
  push:
    paths:
      - 'labels/pending/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  ocr-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        # Added requests library here
        run: |
          pip install google-genai pydantic requests

      - name: Run OCR, Send WhatsApp, and Move Files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -u process_label.py

      - name: Commit and Push Logs
        run: |
          git config --global user.name "LabelBot"
          git config --global user.email "bot@github.com"
          
          git add shipping_master_log.csv
          git add labels/
          
          git commit -m "Automated: Logged labels, sent WA updates, cleaned pending [skip ci]" || echo "No changes"
          git push
